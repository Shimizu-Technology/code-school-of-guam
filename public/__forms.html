<!doctype html>
<html lang="en">
  <head><meta charset="utf-8"><title>Code School of Guam forms</title></head>
  <body>
    <form name="next-cohort-interest" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="next-cohort-interest">
      <input name="bot-field">
      <input name="name">
      <input type="email" name="email">
      <input type="tel" name="phone">
      <select name="preferred_timing"><option>January 2027</option></select>
      <select name="experience_level"><option>Complete beginner</option></select>
      <textarea name="primary_goal"></textarea>
      <input type="checkbox" name="update_consent" value="yes">
    </form>
  </body>
</html>
